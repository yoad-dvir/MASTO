<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה! | נטע שינפלד</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Heebo', sans-serif;
      background: #F8F5F1;
      color: #2B3A52;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 28px;
      padding: 4rem 3rem;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(43,58,82,.1);
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 2rem; font-weight: 800; margin-bottom: .8rem; color: #2B3A52; }
    p { font-size: 1.1rem; color: #6B7A8D; line-height: 1.8; margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #2B3A52, #3D5A80);
      color: #fff;
      padding: .9rem 2.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: all .3s;
      box-shadow: 0 8px 24px rgba(43,58,82,.2);
    }
    a:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(43,58,82,.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>תודה! הפנייה נשלחה בהצלחה</h1>
    <p>נטע תחזור אלייך תוך 24 שעות לתיאום שיחת ההיכרות.<br />בינתיים, אפשר להמשיך לגלוש באתר.</p>
    <a href="index.html">חזרה לאתר ←</a>
  </div>
</body>
</html>
